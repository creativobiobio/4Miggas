```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>4 Miggas - Menú</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
--bg:#f6f1e7;
--card:#ffffff;
--accent:#7a2e2e;
--accent-soft:#a44a4a;
--text:#3b2f2f;
--muted:#8b7e7e;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter;
background:var(--bg);
color:var(--text);
}

header{
padding:30px 20px 10px;
text-align:center;
}

/* LOGO PRINCIPAL */

.logo{
display:block;
margin:auto;
width:280px;
margin-bottom:15px;
}

@media(min-width:700px){
.logo{
width:360px;
}
}

/* BUSCADOR */

.search-box{
max-width:900px;
margin:0 auto 20px auto;
padding:0 20px;
}

.search-box input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
font-size:14px;
}

/* CATEGORIAS */

.category-bar{
max-width:900px;
margin:auto;
display:flex;
overflow-x:auto;
gap:10px;
padding:10px 20px;
}

.cat-btn{
background:white;
border:1px solid #ddd;
padding:6px 14px;
border-radius:20px;
cursor:pointer;
font-size:12px;
white-space:nowrap;
}

.cat-btn.active{
background:var(--accent);
color:white;
}

/* MENU */

.menu{
max-width:900px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:1fr;
gap:16px;
}

@media(min-width:700px){
.menu{
grid-template-columns:1fr 1fr;
}
}

.card{
display:flex;
background:var(--card);
border-radius:14px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
position:relative;
}

.agotado{
opacity:0.45;
filter:grayscale(0.9);
}

.agotado::after{
content:"AGOTADO";
position:absolute;
top:8px;
right:8px;
background:#7a2e2e;
color:white;
font-size:9px;
padding:3px 6px;
border-radius:4px;
}

.img{
width:120px;
height:120px;
background:#eee;
flex-shrink:0;
}

.img img{
width:100%;
height:100%;
object-fit:cover;
}

.info{
padding:12px;
flex:1;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.title{
font-family:Playfair Display;
font-size:16px;
margin-bottom:4px;
}

.desc{
font-size:12px;
color:var(--muted);
margin-bottom:8px;
}

.bottom{
display:flex;
justify-content:space-between;
align-items:center;
}

.price{
font-weight:700;
color:var(--accent);
}

.badge{
font-size:10px;
background:#eee;
padding:3px 8px;
border-radius:6px;
}

/* FOOTER */

footer{
text-align:center;
padding:40px 20px;
color:var(--muted);
font-size:12px;
}

.creativo-link{
display:flex;
flex-direction:column;
align-items:center;
margin-top:25px;
text-decoration:none;
transition:0.3s;
}

.creativo-link:hover{
opacity:0.7;
}

.creativo-logo{
width:35px;
border-radius:6px;
margin-bottom:6px;
}

.creativo-text{
font-size:10px;
letter-spacing:2px;
color:var(--accent);
font-weight:600;
text-transform:uppercase;
}

</style>
</head>

<body>

<header>

<img src="logo.png" class="logo">

<div class="search-box">
<input type="text" id="search" placeholder="Buscar en el menú...">
</div>

</header>

<div class="category-bar" id="cats"></div>

<div class="menu" id="menu"></div>

<footer>

CURANILAHUE · CHILE

<a href="https://www.instagram.com/creativobiobio?igsh=dGZnY2JyMGVydDVq"
target="_blank"
class="creativo-link">

<img src="creativo.png" class="creativo-logo">

<span class="creativo-text">Desarrollado por CREATIVO</span>

</a>

</footer>

<script>

const SHEET_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRKndmjX1CcpICAtCKFwhPwomV8wbnPNgl_s2Bo9rHv9Y4Gq0UPU-tG_XqjCmP2671jzn6QnrdRtYwe/pub?gid=0&single=true&output=csv";

let items=[];

async function load(){

const r=await fetch(SHEET_URL);
const t=await r.text();

const rows=t.split(/\r?\n/).slice(1);

items=rows.map(r=>{

const c=r.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

if(!c)return null;

const clean=c.map(x=>x.replace(/^"|"$/g,""));

return{
cat:clean[0],
name:clean[1],
desc:clean[2],
price:clean[3],
stock:clean[4],
img:clean[5]
};

}).filter(Boolean);

renderCats();
renderMenu("Todo");

}

function renderCats(){

const cats=[...new Set(items.map(i=>i.cat))];

const container=document.getElementById("cats");

container.innerHTML="";

const all=["Todo",...cats];

all.forEach(c=>{

const count=c==="Todo"?items.length:items.filter(i=>i.cat===c).length;

const btn=document.createElement("button");

btn.className="cat-btn";

btn.innerText=c+" ("+count+")";

btn.onclick=()=>{

document.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

renderMenu(c);

};

container.appendChild(btn);

});

container.firstChild.classList.add("active");

}

function renderMenu(cat){

const container=document.getElementById("menu");

let filtered=cat==="Todo"?items:items.filter(i=>i.cat===cat);

const q=document.getElementById("search").value.toLowerCase();

if(q){

filtered=filtered.filter(i=>
i.name.toLowerCase().includes(q) ||
i.desc.toLowerCase().includes(q)
);

}

container.innerHTML=filtered.map(i=>`

<div class="card ${i.stock?.toUpperCase()==="NO"?"agotado":""}">

<div class="img">
${i.img?`<img src="${i.img}">`:""}
</div>

<div class="info">

<div>

<div class="title">${i.name}</div>

<div class="desc">${i.desc}</div>

</div>

<div class="bottom">

<div class="price">$ ${Number(i.price).toLocaleString("es-CL")}</div>

<div class="badge">${i.cat}</div>

</div>

</div>

</div>

`).join("");

}

document.getElementById("search").addEventListener("input",()=>{

const active=document.querySelector(".cat-btn.active");

renderMenu(active?active.innerText.split(" (")[0]:"Todo");

});

load();

</script>

</body>
</html>
