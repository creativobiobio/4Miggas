<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>4 Miggas - Menú Digital</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">

<style>

:root{
--bg-color:#f5efe6;
--card-bg:#ffffff;
--primary-red:#b22222;
--text-main:#2c2c2c;
--text-muted:#6b6b6b;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:var(--bg-color);
color:var(--text-main);
line-height:1.6;
}

/* HEADER */

header{
padding:25px 20px 10px;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
background:linear-gradient(to bottom,#ede6db,var(--bg-color));
}

.logo-container{
width:340px;
max-width:90%;
margin-bottom:0px;
}

.logo-container img{
width:100%;
height:auto;
}

.divider{
width:60px;
height:2px;
background:var(--primary-red);
margin:8px 0 10px 0;
}

/* FILTROS */

.sticky-nav{
position:sticky;
top:0;
z-index:100;
background:rgba(245,239,230,.95);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(0,0,0,.05);
padding:15px 0;
overflow-x:auto;
white-space:nowrap;
}

.filter-container{
display:flex;
gap:10px;
padding:0 20px;
max-width:900px;
margin:auto;
}

.filter-btn{
background:var(--card-bg);
border:1px solid rgba(0,0,0,.1);
color:var(--text-muted);
padding:8px 20px;
border-radius:50px;
font-size:11px;
font-weight:700;
text-transform:uppercase;
cursor:pointer;
}

.filter-btn.active{
background:var(--primary-red);
color:white;
}

/* BUSCADOR */

.search-container{
max-width:900px;
margin:20px auto 10px;
padding:0 20px;
}

#searchInput{
width:100%;
padding:12px 16px;
border-radius:12px;
border:1px solid rgba(0,0,0,.1);
font-size:14px;
background:white;
outline:none;
}

#searchInput:focus{
border-color:var(--primary-red);
box-shadow:0 4px 15px rgba(0,0,0,.1);
}

/* GRID */

main{
max-width:900px;
margin:auto;
padding:0 20px 80px;
min-height:60vh;
}

.grid-menu{
display:grid;
grid-template-columns:1fr;
gap:20px;
}

@media(min-width:768px){
.grid-menu{
grid-template-columns:1fr 1fr;
}
}

/* TARJETAS */

.plato-card{
background:var(--card-bg);
border-radius:16px;
overflow:hidden;
display:flex;
border:1px solid rgba(0,0,0,.05);
box-shadow:0 4px 10px rgba(0,0,0,.06);
transition:transform .25s ease,box-shadow .25s ease;
animation:fadeUp .4s ease;
}

.plato-card:hover{
transform:translateY(-4px);
box-shadow:0 12px 28px rgba(0,0,0,.15);
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

.plato-img{
width:120px;
min-height:120px;
flex-shrink:0;
background:#eee;
}

.plato-img img{
width:100%;
height:100%;
object-fit:cover;
transition:transform .35s ease;
}

.plato-card:hover .plato-img img{
transform:scale(1.05);
}

.plato-info{
padding:15px;
flex-grow:1;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.plato-header h3{
font-family:'Playfair Display',serif;
font-size:17px;
margin-bottom:5px;
}

.plato-desc{
font-size:11px;
color:var(--text-muted);
margin-bottom:10px;
}

.precio{
color:var(--primary-red);
font-weight:900;
font-size:18px;
}

.badge-cat{
font-size:8px;
text-transform:uppercase;
font-weight:700;
color:var(--primary-red);
background:rgba(178,34,34,.1);
padding:2px 8px;
border-radius:4px;
}

/* FOOTER */

footer{
padding:60px 20px;
text-align:center;
background:#efe8dc;
}

.footer-logo{
width:80px;
opacity:.3;
margin-bottom:20px;
}

/* LOADER */

#loader{
position:fixed;
inset:0;
background:var(--bg-color);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:1000;
}

.spinner{
width:40px;
height:40px;
border:3px solid rgba(178,34,34,.1);
border-top-color:var(--primary-red);
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div id="loader">
<div class="spinner"></div>
<p style="margin-top:20px;font-size:10px;letter-spacing:3px;color:var(--primary-red);">
CARGANDO 4 MIGGAS...
</p>
</div>

<header>

<div class="logo-container">
<img src="logo.png">
</div>

<div class="divider"></div>

<p style="font-size:10px;text-transform:uppercase;letter-spacing:4px;color:var(--text-muted);">
Tradición Casera & Familiar
</p>

</header>

<nav class="sticky-nav">
<div class="filter-container" id="category-filters"></div>
</nav>

<div class="search-container">
<input type="text" id="searchInput" placeholder="Buscar en el menú..." onkeyup="searchMenu()">
</div>

<main>
<div class="grid-menu" id="menu-items"></div>
</main>

<footer>

<img src="logo.png" class="footer-logo">

<p style="font-size:11px;color:var(--text-muted);letter-spacing:1px;">
CURANILAHUE · CHILE
</p>

<a href="https://www.instagram.com/creativobiobio?igsh=dGZnY2JyMGVydDVq" target="_blank">

<img src="logo2.jpg" style="width:35px;border-radius:5px;margin-top:20px">

<p style="color:var(--primary-red);font-size:10px;font-weight:bold;letter-spacing:2px;">
DESARROLLADO POR CREATIVO
</p>

</a>

</footer>

<script>

const SHEET_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vTr2kreWK6mtIYF3dHAiWDnu0nD50rvPB5iFMTN8yKdKeV5e4CaKfYF4HeIOsmX_cCG4-mHnc54MUld/pub?output=csv';

let allItems=[];

function formatCLP(val){
const num=parseInt(val.toString().replace(/\D/g,''));
if(isNaN(num)) return `$ ${val}`;
return `$ ${num.toLocaleString('es-CL')}`;
}

async function loadData(){

const response=await fetch(SHEET_URL);
const data=await response.text();
const rows=data.split(/\r?\n/).slice(1);

allItems=rows.map(row=>{

const columns=row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
if(!columns||columns.length<5) return null;

const clean=columns.map(c=>c.replace(/^"|"$/g,'').trim());

return{
categoria:clean[0],
nombre:clean[1],
descripcion:clean[2],
precio:clean[3],
disponible:clean[4]?.toUpperCase()==='SI',
imagen:clean[5]||null
};

}).filter(i=>i!==null);

renderFilters();
renderMenu('Todo');

document.getElementById('loader').style.display='none';

}

function renderFilters(){

const container=document.getElementById('category-filters');

const rawCats=[...new Set(allItems.map(i=>i.categoria))];

const finalCats=['Todo',...rawCats];

container.innerHTML=finalCats.map(cat=>{

const count=cat==='Todo'
?allItems.length
:allItems.filter(i=>i.categoria===cat).length;

return `<button class="filter-btn ${cat==='Todo'?'active':''}" onclick="filterBy('${cat}',this)">
${cat} (${count})
</button>`;

}).join('');

}

function filterBy(cat,btn){

document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
renderMenu(cat);

}

function renderMenu(cat){

const container=document.getElementById('menu-items');

const filtered=cat==='Todo'?allItems:allItems.filter(i=>i.categoria===cat);

renderCustomMenu(filtered);

}

function renderCustomMenu(list){

const container=document.getElementById('menu-items');

container.innerHTML=list.map(item=>`

<div class="plato-card">

<div class="plato-img">
${item.imagen?`<img loading="lazy" src="${item.imagen}" alt="${item.nombre}">`:''}
</div>

<div class="plato-info">

<div class="plato-header">
<h3>${item.nombre}</h3>
<p class="plato-desc">${item.descripcion}</p>
</div>

<div style="display:flex;justify-content:space-between;align-items:center;">
<span class="precio">${formatCLP(item.precio)}</span>
<span class="badge-cat">${item.categoria}</span>
</div>

</div>
</div>

`).join('');

}

function searchMenu(){

const term=document.getElementById("searchInput").value.toLowerCase();

const filtered=allItems.filter(item =>
item.nombre.toLowerCase().includes(term) ||
item.descripcion.toLowerCase().includes(term) ||
item.categoria.toLowerCase().includes(term)
);

renderCustomMenu(filtered);

}

window.onload=loadData;

</script>

</body>
</html>
